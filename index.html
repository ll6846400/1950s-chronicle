<!DOCTYPE html>
<html>
<head>
  <title>The 1950s Chronicle</title>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #f5f1e8;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      border-bottom: 2px solid #333;
    }

    h1 {
      font-size: 48px;
      margin: 0;
      letter-spacing: 2px;
    }

    .subtitle {
      font-style: italic;
      margin-top: 10px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 30px;
    }

    .article {
      background: #fff;
      padding: 20px;
      margin-top: 20px;
      border-left: 5px solid #333;
    }

    .article h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<header>
  <h1>The 1950s Chronicle</h1>
  <div class="subtitle">Stories from a golden era</div>
</header>

<div class="container">

  <div class="article">
    <h2>A Day in 1950: Life Before Screens</h2>
    <p>
      In 1950, mornings began with the sound of radios instead of alarms on phones.
      Newspapers were the main source of news, and families gathered around breakfast tables
      without digital distractions...
    </p>
  </div>

</div>

</body>
</html>
